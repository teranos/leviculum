[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = "tools/uf2-runner.sh"

[target.thumbv7em-none-eabihf]
rustflags = ["-C", "link-arg=-Tlink.x"]

[build]
target = "thumbv7em-none-eabihf"

[env]
# ARM bare-metal headers for nrf-sdc-sys bindgen (needs stdint.h)
C_INCLUDE_PATH = "/usr/lib/gcc/arm-none-eabi/14.2.1/include"
