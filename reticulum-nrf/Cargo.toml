[package]
name = "reticulum-nrf"
version = "0.4.0"
edition = "2021"
authors = ["Lew Palm"]
license = "AGPL-3.0-or-later"
description = "Reticulum firmware for nRF52840-based boards (Heltec Mesh Node T114)"

[dependencies]
reticulum-core = { path = "../reticulum-core", default-features = false }

# Embassy async runtime
embassy-executor = { version = "0.9", features = ["arch-cortex-m", "executor-thread"] }
embassy-nrf = { version = "0.9", features = ["nrf52840", "time-driver-rtc1", "nfc-pins-as-gpio", "gpiote"] }
embassy-time = "0.5"
embassy-sync = "0.7"
embassy-usb = "0.5"
embassy-futures = "0.1"
embassy-embedded-hal = "0.5"
embedded-hal-async = "1"

# Cortex-M support
# critical-section-single-core REMOVED: it uses cpsid/cpsie which blocks
# MPSL's high-priority radio interrupts. nrf-mpsl provides its own
# critical-section impl that masks only application-priority interrupts.
cortex-m = "0.7"
cortex-m-rt = "0.7"

# Heap allocator for alloc
embedded-alloc = "0.7"

# Static initialization
static_cell = "2"

tracing-core = { version = "0.1", default-features = false }
rand_core = { version = "0.6", default-features = false }
heapless = { version = "0.9", default-features = false }
embedded-storage = "0.3"

# BLE stack — pinned to trouble's known-working combination for embassy-nrf 0.9 + bt-hci 0.8
nrf-mpsl = { git = "https://github.com/alexmoon/nrf-sdc", rev = "df7e3b4", features = ["nrf52840", "critical-section-impl"] }
nrf-sdc = { git = "https://github.com/alexmoon/nrf-sdc", rev = "df7e3b4", features = ["nrf52840", "peripheral"] }
trouble-host = { git = "https://github.com/embassy-rs/trouble", branch = "main", default-features = false, features = ["peripheral", "derive", "gatt", "default-packet-pool"] }

[profile.release]
opt-level = "z"      # optimize for size
lto = true           # link-time optimization across all crates
codegen-units = 1    # single codegen unit for maximum LTO
strip = "symbols"    # strip debug symbols from binary

# Firmware binary
[[bin]]
name = "t114"
path = "src/bin/t114.rs"
