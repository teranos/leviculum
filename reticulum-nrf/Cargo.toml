[package]
name = "reticulum-nrf"
version = "0.4.0"
edition = "2021"
authors = ["Lew Palm"]
license = "MIT"
description = "Reticulum firmware for nRF52840-based boards (Heltec Mesh Node T114)"

[features]
default = ["defmt"]
defmt = [
    "dep:defmt",
    "dep:defmt-rtt",
    "dep:panic-probe",
    "embassy-executor/defmt",
    "embassy-nrf/defmt",
    "embassy-time/defmt",
    "embassy-sync/defmt",
]

[dependencies]
reticulum-core = { path = "../reticulum-core", default-features = false }
reticulum-net = { path = "../reticulum-net", default-features = false }

# Embassy async runtime
embassy-executor = { version = "0.9", features = ["arch-cortex-m", "executor-thread"] }
embassy-nrf = { version = "0.9", features = ["nrf52840", "time-driver-rtc1", "nfc-pins-as-gpio"] }
embassy-time = "0.5"
embassy-sync = "0.7"

# Cortex-M support
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# Heap allocator for alloc
embedded-alloc = "0.7"

# Logging and panic handling
defmt = { version = "1.0", optional = true }
defmt-rtt = { version = "1.1", optional = true }
panic-probe = { version = "1.0", features = ["print-defmt"], optional = true }

# Static initialization
static_cell = "2"

[dev-dependencies]
defmt-test = "0.4"

# Firmware binary
[[bin]]
name = "t114"
path = "src/bin/t114.rs"

# On-device test harness
[[test]]
name = "on_device"
harness = false
