# cbindgen configuration for generating C headers

language = "C"
include_guard = "LEVICULUM_H"
include_version = true
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify manually. */"

[defines]
# Any #[cfg(...)] defines

[export]
prefix = ""
include = []
exclude = []

[export.rename]
# Rename exports if needed

[fn]
# Function settings
prefix = ""
postfix = ""
args = "Horizontal"
sort_by = "Name"

[struct]
# Struct settings
derive_eq = true
derive_neq = true

[enum]
# Enum settings
prefix_with_name = true

[parse]
# Parse settings
parse_deps = false
include = []
exclude = []

[parse.expand]
# Macro expansion settings
crates = []
