# CI pipeline for leviculum.
#
# Secrets required in Woodpecker CI settings (ci.codeberg.org):
#   mail           - email address for git commits
#   codeberg_token - Codeberg access token with repo write permission

clone:
  git:
    image: woodpeckerci/plugin-git

when:
  branch: ${CI_REPO_DEFAULT_BRANCH}
  event: [push, cron]

steps:
  check:
    image: rust:bookworm
    commands:
      - apt-get update && apt-get install -y musl-tools
      - cargo fmt --all -- --check
      - cargo clippy --all -- -D warnings
      - cargo test -p reticulum-core --lib

  interop:
    image: rust:bookworm
    commands:
      - apt-get update && apt-get install -y python3 musl-tools
      - git submodule update --init vendor/Reticulum
      - cargo test -p reticulum-std --test rnsd_interop

  build-book:
    image: alpine:edge
    commands:
      - apk add --no-cache mdbook
      - mdbook build docs

  build-man:
    image: alpine:edge
    commands:
      - apk add --no-cache pandoc
      - sh scripts/build-man.sh

  publish:
    image: alpine/git
    environment:
      MAIL:
        from_secret: mail
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - git config --global user.email "$MAIL"
      - git config --global user.name "Woodpecker CI"
      - git clone -b pages https://$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git pages_out || (mkdir pages_out && cd pages_out && git init && git checkout -b pages)
      - cp -ar docs/book/. pages_out/
      - mkdir -p pages_out/man
      - cp -ar target/man/. pages_out/man/
      - cd pages_out
      - git add .
      - if ! git diff --cached --quiet; then git commit -m "Deploy docs ${CI_BUILD_CREATED}" && git push https://$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git pages; fi
