# E31 reproduction: Python rncp sender -> lrncp receiver stalls at ~28% for >100KB
# Topology: alpha (Rust lrnsd + lrncp receiver) -> relay (Python rnsd) -> charlie (Python rnsd + rncp sender)

[test]
name = "e31_repro"
timeout_secs = 300

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "python"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "charlie"
destination = "alpha.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "charlie"
receiver = "alpha"
sender_tool = "rncp"
receiver_tool = "lrncp"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 1
timeout_secs = 120
