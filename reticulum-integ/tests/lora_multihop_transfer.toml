# Multi-hop LoRa transfer through frequency-isolated relay.
#
#   alpha(ACM0, Ch.A) ~~869.5MHz~~ relay(ACM1+ACM2) ~~868.1MHz~~ beta(ACM3, Ch.B)
#
# alpha and beta have NO direct radio path — different frequencies and
# bandwidths make the signal physically undecodable. All traffic must
# route through relay, which bridges Channel A and Channel B.
#
# Timeout: 60s convergence + 120s path + 480s transfer = 660s budget.
# 2-hop LoRa round-trip is ~10s per data part cycle; 480s transfer
# timeout needed because first run timed out at 300s (80% complete).

[test]
name = "lora_multihop_transfer"
description = "lncp push through frequency-isolated 2-hop LoRa relay"
timeout_secs = 600
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

# Global [radio] not used — all nodes specify per-interface radio params.

[nodes.alpha]
type = "rust"
respond_to_probes = true

[[nodes.alpha.rnode_interfaces]]
rnode = "/dev/ttyACM0"
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.relay]
type = "rust"
respond_to_probes = true
enable_transport = true

[[nodes.relay.rnode_interfaces]]
rnode = "/dev/ttyACM1"
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[[nodes.relay.rnode_interfaces]]
rnode = "/dev/ttyACM2"
frequency = 868100000
bandwidth = 125000
sf = 7
cr = 5
txpower = 14

[nodes.beta]
type = "rust"
respond_to_probes = true

[[nodes.beta.rnode_interfaces]]
rnode = "/dev/ttyACM3"
frequency = 868100000
bandwidth = 125000
sf = 7
cr = 5
txpower = 14

# 60s: announce convergence across 2 LoRa hops.
# Each hop needs rebroadcast delay (5s + jitter) + airtime (~0.5s).
# 60s is 3x the realistic ~20s propagation time.
[[steps]]
action = "sleep"
duration_secs = 60

# Verify 2-hop path: alpha -> relay -> beta
[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 120

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 480
