# Cross-implementation fetch: Python rncp fetches from Rust lncp.
# Strongest interop test: Python's rncp -f talking to Rust's lncp -l -F -n.

[test]
name = "lncp_fetch_cross"
description = "Python rncp fetches from Rust lncp through Python relay"
timeout_secs = 600

[nodes.alpha]
type = "python"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "rncp"
receiver_tool = "lncp"
mode = "fetch"
receiver_flags = "-F -n"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
