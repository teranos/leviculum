[test]
name = "double_restart_identity_persistence"
description = "Identity persists across multiple restarts, paths recover each time"
timeout_secs = 120

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[links]
alice-bob = "tcp"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 30

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 1
expect_result = "success"

[[steps]]
action = "restart"
node = "alice"

[[steps]]
action = "sleep"
duration_secs = 20

[[steps]]
action = "rnprobe"
from = "bob"
to = "alice.probe"
expect_hops = 1
expect_result = "success"

[[steps]]
action = "restart"
node = "alice"

[[steps]]
action = "sleep"
duration_secs = 20

[[steps]]
action = "rnprobe"
from = "bob"
to = "alice.probe"
expect_hops = 1
expect_result = "success"
