# Push with identity auth: alpha identifies via link.identify(), charlie's
# listener allows alpha's identity hash. Transfer succeeds.

[test]
name = "lncp_auth"
description = "Push with identity authentication"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lncp"
receiver_tool = "lncp"
# auth_from = "alpha" means: extract alpha's identity hash and pass it
# as -a to charlie's listener. Alpha connects and identifies as alpha.
# Since alpha's identity hash matches, the listener accepts -> transfer succeeds.
auth_from = "alpha"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
