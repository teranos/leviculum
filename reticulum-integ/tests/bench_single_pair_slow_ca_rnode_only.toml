[test]
name = "bench_single_pair_slow_ca_rnode_only"
description = "Single-pair probe throughput (SF10/BW125/CR4/8) with CSMA/CA on"
timeout_secs = 900

[radio]
frequency = 869525000
bandwidth = 125000
sf = 10
cr = 8
txpower = 17
csma_enabled = true

[nodes.sender]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.receiver]
type = "rust"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 120

[[steps]]
action = "wait_for_path"
on = "sender"
destination = "receiver.probe"
timeout_secs = 300

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "benchmark"
pairs = [{ from = "sender", to = "receiver.probe" }]
duration_secs = 180
label = "single_pair_slow_ca_rnode_only"
