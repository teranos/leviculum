# Fetch with identity auth: charlie allows alpha to fetch. Alpha identifies
# via link.identify() -> authorized -> fetch succeeds.

[test]
name = "lncp_fetch_auth"
description = "Fetch with identity authentication"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lncp"
receiver_tool = "lncp"
mode = "fetch"
receiver_flags = "-F"
auth_from = "alpha"
file_sizes = [102400]
direction = "a_to_b"
repeats = 1
timeout_secs = 300
