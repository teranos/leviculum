# Bidirectional split protocol test for T114 LoRa.
#
# Tests both directions of split packet handling:
#
# RX (RNode → T114): A padded announce on the rnode container triggers
# the RNode firmware's split TX. The T114 reassembles the two LoRa frames.
#
# TX (T114 → RNode): A padded announce on the lnode container goes through
# lnsd → serial → T114 → LoRa. The T114 splits it into two frames.
# The RNode firmware reassembles them.
#
# Both directions use 100 bytes app_data (~267 bytes on wire, exceeds the
# 254-byte single-frame limit).
#
# Verify in T114 debug log:
#   RX: "RX split part" followed by "RX ... bytes" (reassembled)
#   TX: "TX split ... bytes" followed by "TX done"

[test]
name = "lora_lnode_split"
description = "Bidirectional split LoRa packets between T114 and RNode"
timeout_secs = 240
rust_log = "reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17

[nodes.rnode]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode]
type = "rust"
respond_to_probes = true
serial = true

# Warm up: wait for single-frame announces to propagate
[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "rnode"
destination = "lnode.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "lnode"
destination = "rnode.probe"
timeout_secs = 90

# --- Split RX: RNode → T114 ---
# Padded announce from rnode. RNode firmware splits it, T114 reassembles.
[[steps]]
action = "exec"
on = "rnode"
command = "python3 /opt/integ-scripts/padded_announce.py 100"
expect_exit_code = 0
timeout_secs = 60

# Verify link still works after split RX traffic
[[steps]]
action = "rnprobe"
from = "lnode"
to = "rnode.probe"
expect_result = "success"
timeout_secs = 90

# --- Split TX: T114 → RNode ---
# Padded announce from lnode. Goes lnsd → serial → T114 → LoRa (split TX).
# RNode firmware reassembles and delivers to its lnsd.
[[steps]]
action = "exec"
on = "lnode"
command = "python3 /opt/integ-scripts/padded_announce.py 100"
expect_exit_code = 0
timeout_secs = 60

# Give time for the split announce to propagate over LoRa
[[steps]]
action = "sleep"
duration_secs = 20

# Verify link still works after split TX traffic
[[steps]]
action = "rnprobe"
from = "rnode"
to = "lnode.probe"
expect_result = "success"
timeout_secs = 90
