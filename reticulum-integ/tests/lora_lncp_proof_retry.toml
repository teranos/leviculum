# E34 proof re-send test: proxy drops first 2 proof-sized frames going
# b_to_a, verifying that the responder re-sends the cached proof when
# the initiator retries the link request.
#
# Proofs are ~118 bytes. The proxy targets frames 105-130 bytes going
# b_to_a (from radio to alpha's container), which matches proofs but not
# announces (~167), link requests (~86), or data segments (~490).
#
# Without proof re-send, this test would fail: alpha sends link request,
# beta sends proof (dropped by proxy), alpha retries link request (E34),
# beta ignores duplicate request, link times out. With proof re-send,
# beta detects the duplicate request and re-sends the cached proof.

[test]
name = "lora_lncp_proof_retry"
description = "lncp push over LoRa after 2 dropped proofs recovered by proof re-send on E34 retry"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::node=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Drop first 2 proof-sized frames going b_to_a (105-130 bytes).
# Proofs ~118 bytes are in this range.
# Link requests ~86 bytes, announces ~167 bytes, data ~490 bytes are outside.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=b_to_a filter=cmd:0x00 min_size=105 max_size=130 count=2"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 300

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 2
