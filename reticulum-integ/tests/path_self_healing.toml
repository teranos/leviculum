[test]
name = "path_self_healing"
description = "Triangle topology: direct 1-hop path must win over 2-hop relay path"
timeout_secs = 90

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.bob]
type = "rust"
respond_to_probes = true

[links]
alice-relay = "tcp"
relay-bob = "tcp"
alice-bob = "tcp"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 30

[[steps]]
action = "sleep"
duration_secs = 5

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 1
expect_result = "success"

[[steps]]
action = "wait_for_path"
on = "bob"
destination = "alice.probe"
timeout_secs = 30

[[steps]]
action = "sleep"
duration_secs = 5

[[steps]]
action = "rnprobe"
from = "bob"
to = "alice.probe"
expect_hops = 1
expect_result = "success"
