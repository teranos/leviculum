# LNode↔LNode lncp bidirectional file transfer over LoRa.
#
# Two LNodes (T114 + RAK4631) each connected to its own lnsd in a
# Docker container. lncp transfers a 2 KiB file in each direction
# over the LoRa link. Verifies that two LNodes can do real data
# transfer end-to-end (post-Bug-#32 fix validation).
#
# Mirror of lora_lncp_bidir.toml but with serial=true (LNode firmware)
# instead of rnode=true (ESP32 RNode firmware). Same lncp action.
# Radio config matches firmware default (RadioConfig::eu_medium in
# reticulum-nrf::lora).

[test]
name = "lora_lnode_lncp_bidir"
description = "lncp bidirectional 2KB between two LNodes over direct LoRa"
timeout_secs = 900
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
# Matches reticulum-nrf::lora::RadioConfig::eu_medium() and the firmware
# default emitted by both T114 and RAK4631 binaries on bug32-softdevice-spike.
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
serial = true

[nodes.beta]
type = "rust"
respond_to_probes = true
serial = true

# Warm up: wait for announces to propagate
[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [32768]
direction = "both"
repeats = 1
timeout_secs = 600
