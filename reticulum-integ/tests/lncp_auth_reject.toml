# Push with wrong identity: charlie's listener allows charlie's own identity
# hash. Alpha connects and identifies as alpha. Since alpha's identity hash
# != charlie's identity hash, the listener rejects the link -> transfer fails.

[test]
name = "lncp_auth_reject"
description = "Push rejected due to identity mismatch"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lncp"
receiver_tool = "lncp"
# auth_from = "charlie" means: extract charlie's identity hash and pass it
# as -a to charlie's listener. Alpha connects and identifies as alpha.
# Since alpha's identity hash != charlie's identity hash, the listener
# rejects the link -> link closed -> transfer fails.
auth_from = "charlie"
expect_result = "failure"
file_sizes = [1024]
direction = "a_to_b"
repeats = 1
timeout_secs = 300
