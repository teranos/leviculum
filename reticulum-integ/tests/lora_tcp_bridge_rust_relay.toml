# LoRa-to-TCP bridge via Rust relay.
# alpha(Rust+RNode0) ~~~LoRa~~~ beta(Rust+RNode1+TCPServer) --TCP-- charlie(Python+TCPClient)
# Uses selftest --mode link to verify bidirectional channel communication across media.
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lnsd with: cargo build --release --bin lnsd --features serial
# Build lns with: cargo build --release --bin lns

[test]
name = "lora_tcp_bridge_rust_relay"
description = "LoRa-to-TCP bridge via Rust relay, selftest link+channel"
timeout_secs = 240
rust_log = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
listen_port = 4242

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.charlie]
type = "python"
respond_to_probes = true
listen_port = 4242

[links]
beta-charlie = "tcp"

[[steps]]
action = "sleep"
duration_secs = 40

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 120

[[steps]]
action = "wait_for_path"
on = "charlie"
destination = "alpha.probe"
timeout_secs = 120

[[steps]]
action = "rnprobe"
from = "alpha"
to = "charlie.probe"
expect_result = "success"
timeout_secs = 120

[[steps]]
action = "exec"
on = "alpha"
command = "lns selftest 127.0.0.1:4242 charlie:4242 --mode link --rate 1 --duration 3 --discovery-timeout 240"
expect_exit_code = 0
env = { RUST_LOG = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info" }
