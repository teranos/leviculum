[test]
name = "non_transport_no_relay"
description = "Non-transport node between two transport nodes must NOT relay packets"
timeout_secs = 90

[nodes.alice]
type = "rust"
enable_transport = true
respond_to_probes = true

[nodes.middle]
type = "rust"
enable_transport = false
respond_to_probes = false

[nodes.bob]
type = "python"
enable_transport = true
respond_to_probes = true

[links]
alice-middle = "tcp"
bob-middle = "tcp"

# 1. Sanity check: middle can see alice's announce (link is alive)
[[steps]]
action = "wait_for_path"
on = "middle"
destination = "alice.probe"
timeout_secs = 30

# 2. Wait for bob.probe on alice — should NOT arrive because middle doesn't relay
[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 20
expect_result = "no_path"

# 3. Probe alice → bob should fail (no path through non-transport middle)
[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_result = "fail"
timeout_secs = 10
