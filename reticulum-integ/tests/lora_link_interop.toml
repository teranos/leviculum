# Link establishment + channel messaging over LoRa, Rust↔Python.
# Uses selftest --mode link to verify bidirectional channel communication.
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lrnsd with: cargo build --release --bin lrnsd --features serial
# Build lrns with: cargo build --release --bin lrns

[test]
name = "lora_link_interop"
description = "Rust↔Python link and channel messages over LoRa via selftest"
timeout_secs = 600
rust_log = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
listen_port = 4242

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"
listen_port = 4242

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 90

[[steps]]
action = "exec"
on = "alpha"
command = "lrns selftest 127.0.0.1:4242 beta:4242 --mode link --rate 1 --duration 60 --discovery-timeout 240"
expect_exit_code = 0
env = { RUST_LOG = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info" }
