[test]
name = "bench_dual_pair_slow_ca"
description = "Dual-pair probe throughput under contention (SF10/BW125/CR4/8) with CSMA/CA on"
timeout_secs = 900

[radio]
frequency = 869525000
bandwidth = 125000
sf = 10
cr = 8
txpower = 17
csma_enabled = true

[nodes.rnode_a]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode_a]
type = "rust"
respond_to_probes = true
serial = true

[nodes.rnode_b]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode_b]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 120

[[steps]]
action = "wait_for_path"
on = "rnode_a"
destination = "lnode_a.probe"
timeout_secs = 300

[[steps]]
action = "wait_for_path"
on = "rnode_b"
destination = "lnode_b.probe"
timeout_secs = 300

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "benchmark"
pairs = [
  { from = "rnode_a", to = "lnode_a.probe" },
  { from = "rnode_b", to = "lnode_b.probe" },
]
duration_secs = 180
label = "dual_pair_slow_ca"
