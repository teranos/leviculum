[test]
name = "probe_through_relay"
description = "Probe from A through relay R to B, verify 2 hops"
timeout_secs = 90

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.bob]
type = "rust"
respond_to_probes = true

[links]
alice-relay = "tcp"
relay-bob = "tcp"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 30

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 2
expect_result = "success"

[[steps]]
action = "wait_for_path"
on = "bob"
destination = "alice.probe"
timeout_secs = 30

[[steps]]
action = "rnprobe"
from = "bob"
to = "alice.probe"
expect_hops = 2
expect_result = "success"
