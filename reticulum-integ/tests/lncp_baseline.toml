# Baseline: rncp (Python tools) through all-Python topology
# Measures Python rncp transfer performance for comparison with lncp.

[test]
name = "lncp_baseline"
description = "Baseline: Python rncp through all-Python topology"
timeout_secs = 600

[nodes.alpha]
type = "python"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "python"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

# All-Python topology — extra settle time so the relay's TCP sessions
# are fully bedded in before the first path query. Even with this
# margin, vendor rnsd occasionally drops path responses on its own
# LocalInterface, producing an intermittent failure in step 2 or 3.
# Tracked separately; the wait_for_path framework retries internally.
[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 120

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "rncp"
receiver_tool = "rncp"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
