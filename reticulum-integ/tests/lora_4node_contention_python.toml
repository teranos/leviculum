# 4-node shared medium contention: two simultaneous Python rncp transfers
# on the same LoRa frequency, competing for airtime via CSMA/CA.
#
#   alpha → beta   (2KB rncp, thread 1)
#   gamma → delta  (2KB rncp, thread 2)
#
# All 4 Python nodes share 869.525 MHz / 62.5 kHz / SF7.
# Requires 4 RNode devices at /dev/ttyACM0..3.

[test]
name = "lora_4node_contention_python"
description = "Two simultaneous 2KB Python rncp transfers on shared LoRa medium"
timeout_secs = 600
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.gamma]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM2"

[nodes.delta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM3"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "gamma"
destination = "delta.probe"
timeout_secs = 90

# Python rnsd has no E34 link request retry. Under 4-node RF contention,
# link proof loss causes rncp to give up and rediscover. The transfer
# fails reliably. This test documents the known Python limitation.
[[steps]]
action = "parallel_file_transfers"
timeout_secs = 300
expect_result = "failure"

[[steps.transfers]]
sender = "alpha"
receiver = "beta"
sender_tool = "rncp"
receiver_tool = "rncp"
file_size = 2048
timeout_secs = 240

[[steps.transfers]]
sender = "gamma"
receiver = "delta"
sender_tool = "rncp"
receiver_tool = "rncp"
file_size = 2048
timeout_secs = 240
