[test]
name = "bench_dual_pair_medium"
description = "Dual-pair probe throughput under contention (SF7/BW125)"
timeout_secs = 360
rust_log = "reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17
csma_enabled = false

[nodes.rnode_a]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode_a]
type = "rust"
respond_to_probes = true
serial = true

[nodes.rnode_b]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode_b]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "wait_for_path"
on = "rnode_a"
destination = "lnode_a.probe"
timeout_secs = 120

[[steps]]
action = "wait_for_path"
on = "rnode_b"
destination = "lnode_b.probe"
timeout_secs = 120

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "benchmark"
pairs = [
  { from = "rnode_a", to = "lnode_a.probe" },
  { from = "rnode_b", to = "lnode_b.probe" },
]
duration_secs = 60
label = "dual_pair_medium"
