# Reproduce late-announce forwarding failure over LoRa (4-node escalation).
#
#   a1(Rust) ── hub_a(Rust) ~~LoRa~~ hub_b(Python) ── b1(Rust)
#
# 4 nodes = 4 management announces through LoRa (vs 2 in the 2-node test).
# After initial convergence, wait 5 minutes for Python's announce rate
# tracking to accumulate, then run selftest with ephemeral clients whose
# announces must propagate through the LoRa link.
#
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lrnsd with: cargo build --release --bin lrnsd --features serial
# Build lrns with: cargo build --release --bin lrns

[test]
name = "lora_late_announce_4node"
description = "Late announce forwarding over LoRa after 5-min idle, 4 nodes"
timeout_secs = 900

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.hub_a]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.hub_b]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.a1]
type = "rust"
respond_to_probes = true
listen_port = 5555

[nodes.b1]
type = "rust"
respond_to_probes = true
listen_port = 5555

[links]
a1-hub_a = "tcp"
b1-hub_b = "tcp"

# Phase 0: Let management announces settle
[[steps]]
action = "sleep"
duration_secs = 60

# Phase 1: Verify initial cross-cluster path convergence
[[steps]]
action = "wait_for_path"
on = "a1"
destination = "b1.probe"
timeout_secs = 120

[[steps]]
action = "wait_for_path"
on = "b1"
destination = "a1.probe"
timeout_secs = 120

# Phase 2: Wait 5 minutes for rate limiter accumulation
[[steps]]
action = "sleep"
duration_secs = 300

# Phase 3: Selftest — new announces must propagate through LoRa
[[steps]]
action = "exec"
on = "a1"
command = "lrns selftest 127.0.0.1:5555 b1:5555 --mode link --rate 1 --duration 3 --discovery-timeout 240"
expect_exit_code = 0
