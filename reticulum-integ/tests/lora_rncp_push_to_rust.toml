[test]
name = "lora_rncp_push_to_rust"
description = "rncp push 1KB over direct LoRa (Python sender, Rust receiver)"
timeout_secs = 360

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "rncp"
receiver_tool = "lrncp"
file_sizes = [1024]
direction = "a_to_b"
repeats = 1
timeout_secs = 120
