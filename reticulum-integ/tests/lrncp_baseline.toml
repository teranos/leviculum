# Baseline: rncp (Python tools) through Python relay on Rust daemons
# Measures Python rncp transfer performance for comparison with lrncp.
# Uses Rust daemons (lrnsd) for reliable announce propagation —
# all-Python topologies have unreliable announce timing through relays.

[test]
name = "lrncp_baseline"
description = "Baseline: Python rncp on Rust daemons through Python relay"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "rncp"
receiver_tool = "rncp"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
