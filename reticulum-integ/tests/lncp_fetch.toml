# Fetch mode: Rust lncp fetches files from Rust lncp through Python relay.
# Tests -f (fetch) and -F (allow fetch) flags end-to-end.

[test]
name = "lncp_fetch"
description = "Rust lncp fetch through Python relay"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lncp"
receiver_tool = "lncp"
mode = "fetch"
receiver_flags = "-F -n"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
