[test]
name = "rnstatus_transport_info"
description = "rnstatus works against both Rust and Python daemons"
timeout_secs = 60

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[links]
alice-bob = "tcp"

[[steps]]
action = "sleep"
duration_secs = 5

[[steps]]
action = "exec"
on = "alice"
command = "rnstatus --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "Transport Instance"

[[steps]]
action = "exec"
on = "bob"
command = "rnstatus --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "Transport Instance"
