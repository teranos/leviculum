# 50KB transfer with 6 dropped data frames over LoRa.
# Closes Codeberg issue #14: proxy coverage for large resource transfers.
#
# 50KB (51200 bytes) is the largest size from lora_lncp_size_sweep.
# ~105 data segments at ~490 bytes each. Dropping 6 exercises retransmit
# recovery at scale — the resource window, hashmap exchange, and timeout
# calculations are stressed far more than at 10KB (22 segments).
#
# At 62.5kHz SF7 (2734 bps): ~240s without drops, ~300s with 6 drops
# and retransmit overhead. 480s transfer timeout gives comfortable margin.

[test]
name = "lora_lncp_proxy_50kb"
description = "lncp push 50KB over LoRa with proxy dropping 6 data frames"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Drop 6 full-size resource data segments (491 bytes each).
# min_size=490 cleanly targets only full data segments — excludes
# resource ADV (varies: 211-443 bytes for 50KB), partial segments
# (483 bytes), REQ (115-131 bytes), and all other packet types.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=a_to_b filter=cmd:0x00 min_size=490 count=6"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [51200]
direction = "a_to_b"
repeats = 1
timeout_secs = 480

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 6
