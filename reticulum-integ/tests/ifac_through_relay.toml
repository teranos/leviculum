[test]
name = "ifac_through_relay"
description = "IFAC on all links with same credentials, multi-hop probe succeeds"
timeout_secs = 90

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[links.alice-relay]
type = "tcp"
networkname = "meshnet"
passphrase = "hop_test_key"

[links.bob-relay]
type = "tcp"
networkname = "meshnet"
passphrase = "hop_test_key"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 45

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 2
expect_result = "success"
