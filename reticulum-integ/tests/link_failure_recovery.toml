[test]
name = "link_failure_recovery"
description = "Block direct link, probe reroutes via relay, restore link, probe returns to 1 hop"
timeout_secs = 180

[nodes.alice]
type = "rust"
enable_transport = true
respond_to_probes = true

[nodes.relay]
type = "python"
enable_transport = true
respond_to_probes = false

[nodes.bob]
type = "rust"
enable_transport = true
respond_to_probes = true

[links]
alice-bob = "tcp"
alice-relay = "tcp"
bob-relay = "tcp"

# 1. Establish direct path
[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 30

[[steps]]
action = "sleep"
duration_secs = 5

# 2. Verify direct 1-hop path works
[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 1
expect_result = "success"

# 3a. Block direct link alice -> bob
[[steps]]
action = "block_link"
from = "alice"
to = "bob"

# 3b. Block direct link bob -> alice (bidirectional)
[[steps]]
action = "block_link"
from = "bob"
to = "alice"

# 4. Wait for path expiry / re-discovery via relay
[[steps]]
action = "sleep"
duration_secs = 30

# 5. Probe should now route via relay (2 hops)
[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 2
expect_result = "success"
timeout_secs = 30

# 6a. Restore direct link alice -> bob
[[steps]]
action = "restore_link"
from = "alice"
to = "bob"

# 6b. Restore direct link bob -> alice (bidirectional)
[[steps]]
action = "restore_link"
from = "bob"
to = "alice"

# 7. Wait for re-announce / path healing
[[steps]]
action = "sleep"
duration_secs = 20

# 8. Probe should return to 1-hop direct path
[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 1
expect_result = "success"
timeout_secs = 30
