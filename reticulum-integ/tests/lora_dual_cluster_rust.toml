# Dual-cluster topology with LoRa backbone, both hubs Rust.
#
#   Cluster A (TCP):              Cluster B (TCP):
#     a1(Rust) ──┐                  ┌── b1(Rust)
#     a2(Python)─┤                  ├── b2(Python)
#     a3(Rust) ──┼─ hub_a(Rust) ~~LoRa~~ hub_b(Rust) ─┼── b3(Rust)
#     a4(Python)─┘                  └── b4(Python)
#
# hub_a and hub_b are transport relays with RNode interfaces.
# LoRa is the ONLY path between clusters.
#
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lnsd with: cargo build --release --bin lnsd --features serial

[test]
name = "lora_dual_cluster_rust"
description = "10-node dual cluster over LoRa, both hubs Rust"
timeout_secs = 900
rust_log = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.hub_a]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.hub_b]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.a1]
type = "rust"
respond_to_probes = true

[nodes.a2]
type = "python"
respond_to_probes = true

[nodes.a3]
type = "rust"
respond_to_probes = true

[nodes.a4]
type = "python"
respond_to_probes = true

[nodes.b1]
type = "rust"
respond_to_probes = true

[nodes.b2]
type = "python"
respond_to_probes = true

[nodes.b3]
type = "rust"
respond_to_probes = true

[nodes.b4]
type = "python"
respond_to_probes = true

[links]
a1-hub_a = "tcp"
a2-hub_a = "tcp"
a3-hub_a = "tcp"
a4-hub_a = "tcp"
b1-hub_b = "tcp"
b2-hub_b = "tcp"
b3-hub_b = "tcp"
b4-hub_b = "tcp"

# Phase 0: Let management announces settle
[[steps]]
action = "sleep"
duration_secs = 90

# Phase 1: Cross-cluster path convergence
[[steps]]
action = "wait_for_path"
on = "a1"
destination = "b1.probe"
timeout_secs = 180

[[steps]]
action = "wait_for_path"
on = "a2"
destination = "b3.probe"
timeout_secs = 180

[[steps]]
action = "wait_for_path"
on = "a4"
destination = "b4.probe"
timeout_secs = 180

[[steps]]
action = "wait_for_path"
on = "b1"
destination = "a1.probe"
timeout_secs = 180

[[steps]]
action = "wait_for_path"
on = "b2"
destination = "a3.probe"
timeout_secs = 180

[[steps]]
action = "wait_for_path"
on = "b4"
destination = "a4.probe"
timeout_secs = 180

# Phase 2: Cross-cluster probes
[[steps]]
action = "rnprobe"
from = "a1"
to = "b1.probe"
expect_result = "success"
timeout_secs = 120

[[steps]]
action = "rnprobe"
from = "b2"
to = "a3.probe"
expect_result = "success"
timeout_secs = 120

[[steps]]
action = "rnprobe"
from = "a4"
to = "b3.probe"
expect_result = "success"
timeout_secs = 120

[[steps]]
action = "rnprobe"
from = "b1"
to = "a2.probe"
expect_result = "success"
timeout_secs = 120

# Phase 3: Intra-cluster probes (TCP only, fast)
# (Selftest link+channel omitted: the selftest warmup+burst of 20+ messages
# saturates the 2734 bps LoRa channel in a 10-node topology. Link+channel
# over LoRa is tested in lora_link_interop with a simpler topology.)
[[steps]]
action = "rnprobe"
from = "a2"
to = "a3.probe"
expect_result = "success"
timeout_secs = 30

[[steps]]
action = "rnprobe"
from = "b2"
to = "b4.probe"
expect_result = "success"
timeout_secs = 30
