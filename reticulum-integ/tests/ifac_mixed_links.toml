[test]
name = "ifac_mixed_links"
description = "IFAC: one link plain, one link IFAC, probe through relay succeeds"
timeout_secs = 90

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[links]
alice-relay = "tcp"

[links.bob-relay]
type = "tcp"
networkname = "securenet"
passphrase = "secret456"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 45

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 2
expect_result = "success"
