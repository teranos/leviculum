[test]
name = "bench_single_pair_medium_ca_rnode_only"
description = "Single-pair probe throughput (SF7/BW125) with CSMA/CA on"
timeout_secs = 300

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17
csma_enabled = true

[nodes.sender]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.receiver]
type = "rust"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "sender"
destination = "receiver.probe"
timeout_secs = 90

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "benchmark"
pairs = [{ from = "sender", to = "receiver.probe" }]
duration_secs = 60
label = "single_pair_medium_ca_rnode_only"
