# Multi-hop LoRa transfer with frame loss on Channel A (alpha side).
#
#   alpha(ACM0, Ch.A, PROXY) ~~869.5MHz~~ relay(ACM1+ACM2) ~~868.1MHz~~ beta(ACM3, Ch.B)
#
# Proxy on alpha drops 3 data frames mid-transfer (a_to_b, >=400 bytes).
# 5KB file stresses the loss recovery path through 2 LoRa hops.
#
# alpha uses single rnode + rnode_proxy (proxy requires single rnode).
# Global [radio] provides Channel A params for alpha's single rnode.
# relay and beta use rnode_interfaces for their own radio params.
#
# Timeout: 60s + 120s path + 480s transfer = 660s budget. 900s overall.

[test]
name = "lora_multihop_link_loss"
description = "5KB lncp push through 2-hop LoRa relay with 3 dropped frames on Channel A"
timeout_secs = 900
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_core::resource=debug,reticulum_std::interfaces=debug,info"

# Global radio for alpha's single rnode (Channel A).
[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
rnode_proxy = true

[nodes.relay]
type = "rust"
respond_to_probes = true
enable_transport = true

[[nodes.relay.rnode_interfaces]]
rnode = "/dev/ttyACM1"
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[[nodes.relay.rnode_interfaces]]
rnode = "/dev/ttyACM2"
frequency = 868100000
bandwidth = 125000
sf = 7
cr = 5
txpower = 14

[nodes.beta]
type = "rust"
respond_to_probes = true

[[nodes.beta.rnode_interfaces]]
rnode = "/dev/ttyACM3"
frequency = 868100000
bandwidth = 125000
sf = 7
cr = 5
txpower = 14

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 120

# Drop 3 data frames >=400 bytes going a_to_b (alpha -> relay).
# Data segments are ~490 bytes. Announces ~167, link requests ~86,
# proofs ~83-118 bytes are all below 400.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=a_to_b filter=cmd:0x00 min_size=400 count=3"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [5120]
direction = "a_to_b"
repeats = 1
timeout_secs = 480

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 3
