# LoRa transfer with proxy dropping 4 data frames.
# 10KB file produces ~22 parts — dropping 4 tests multi-retransmit recovery.

[test]
name = "lora_lrncp_proxy_4drop"
description = "lrncp push 10KB over LoRa with proxy dropping 4 data frames"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Drop 4 large data frames (resource segments ≈490 bytes)
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=a_to_b filter=cmd:0x00 min_size=400 count=4"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lrncp"
receiver_tool = "lrncp"
file_sizes = [10240]
direction = "a_to_b"
repeats = 1
timeout_secs = 360

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 4
