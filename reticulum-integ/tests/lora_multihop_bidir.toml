# Bidirectional multi-hop LoRa transfer through frequency-isolated relay.
#
#   alpha(ACM0, Ch.A) ~~869.5MHz~~ relay(ACM1+ACM2) ~~868.1MHz~~ beta(ACM3, Ch.B)
#
# Sequential: alpha->beta 2KB, then beta->alpha 2KB.
# Tests that routing works in both directions through the relay.
#
# Timeout: 60s + 120s path x2 + 300s transfer x2 = 900s budget.

[test]
name = "lora_multihop_bidir"
description = "Bidirectional lncp push through frequency-isolated 2-hop LoRa relay"
timeout_secs = 900
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[nodes.alpha]
type = "rust"
respond_to_probes = true

[[nodes.alpha.rnode_interfaces]]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.relay]
type = "rust"
respond_to_probes = true
enable_transport = true

[[nodes.relay.rnode_interfaces]]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[[nodes.relay.rnode_interfaces]]
frequency = 868100000
bandwidth = 125000
sf = 7
cr = 5
txpower = 14

[nodes.beta]
type = "rust"
respond_to_probes = true

[[nodes.beta.rnode_interfaces]]
frequency = 868100000
bandwidth = 125000
sf = 7
cr = 5
txpower = 14

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 120

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 120

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "both"
repeats = 1
timeout_secs = 480
