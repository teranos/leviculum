# lncp fetch with identity authentication over LoRa.
# Combines fetch mode (-F) with auth (-a): the listener only serves
# fetch requests from alpha's identity. Verifies that authenticated
# fetch works end-to-end over LoRa.

[test]
name = "lora_lncp_auth_fetch"
description = "lncp fetch with identity auth over direct LoRa"
timeout_secs = 360
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
mode = "fetch"
receiver_flags = "-F"
auth_from = "alpha"
file_sizes = [1024]
direction = "a_to_b"
repeats = 1
timeout_secs = 120
