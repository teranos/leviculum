# Serial frame delivery test: verify HDLC frames from lnsd arrive at T114 intact.
# The T114 should receive lnsd's announce via serial and relay it to LoRa.
# If the RNode receives the relayed announce, serial delivery works.
# Devices are auto-discovered by USB vendor ID and CMD_DETECT probe.

[test]
name = "lora_lnode_serial_relay"
description = "Verify lnsd announce is delivered via serial to T114 and relayed to LoRa"
timeout_secs = 120
rust_log = "reticulum_std::interfaces::serial=debug,reticulum_core::transport=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17

[nodes.rnode]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 20

# Key test: does the RNode see the lnode's announce relayed via T114?
[[steps]]
action = "wait_for_path"
on = "rnode"
destination = "lnode.probe"
timeout_secs = 60
