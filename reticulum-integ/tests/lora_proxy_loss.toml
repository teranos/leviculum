# Two Rust nodes over LoRa with a proxy in the middle.
# The proxy drops the first 2 CMD_DATA (0x00) frames, then lets
# traffic through. Proves fault injection works end-to-end.
#
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build with:
#   cargo build --release --bin lrnsd --features serial
#   cargo build --release --bin lora-proxy

[test]
name = "lora_proxy_loss"
description = "Proxy drops 2 data frames, nodes still discover each other"
timeout_secs = 240
rust_log = "reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

# No [links] — LoRa broadcast medium.

# Step 1: Add a drop rule on alpha's proxy — drop first 2 CMD_DATA frames.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=a_to_b filter=cmd:0x00 count=2"

# Step 2: Wait for initial announce exchange. The first 2 data frames from
# alpha->radio will be silently dropped by the proxy. The nodes should
# still discover each other via retransmission or beta's announce.
[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 120

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 120

# Step 3: Probe should succeed (the drop rule is exhausted after 2 frames).
[[steps]]
action = "rnprobe"
from = "alpha"
to = "beta.probe"
expect_result = "success"
timeout_secs = 90

# Step 4: Check that the proxy actually dropped frames.
[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 2
