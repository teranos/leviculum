[test]
name = "selftest_ratchet_chain"
description = "Ratchet selftest through two-hop Rust chain"
timeout_secs = 300

[nodes.daemon_a]
type = "rust"
respond_to_probes = false

[nodes.relay]
type = "rust"
respond_to_probes = false

[nodes.daemon_b]
type = "rust"
respond_to_probes = false

[links]
daemon_a-relay = "tcp"
daemon_b-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 5

[[steps]]
action = "exec"
on = "daemon_a"
command = "lrns selftest 127.0.0.1:4242 daemon_b:4242 --mode ratchet-basic --duration 30"
expect_exit_code = 0
expect_stdout_contains = "PASS"
