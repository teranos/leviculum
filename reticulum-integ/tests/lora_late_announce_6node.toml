# Reproduce late-announce forwarding failure over LoRa (6-node escalation).
#
#   a1(Rust) ─┐                                          ┌── b1(Rust)
#              ├── hub_a(Rust) ~~LoRa~~ hub_b(Python) ──┤
#   a2(Python)─┘                                          └── b2(Python)
#
# 6 nodes = 6 management announces through LoRa (vs 4 in the 4-node test).
# After initial convergence, wait 5 minutes for Python's announce rate
# tracking to accumulate, then run selftest with ephemeral clients whose
# announces must propagate through the LoRa link.
#
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lnsd with: cargo build --release --bin lnsd --features serial
# Build lns with: cargo build --release --bin lns

[test]
name = "lora_late_announce_6node"
description = "Late announce forwarding over LoRa after 5-min idle, 6 nodes"
timeout_secs = 900
rust_log = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.hub_a]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.hub_b]
type = "python"
respond_to_probes = true
rnode = true

[nodes.a1]
type = "rust"
respond_to_probes = true
listen_port = 5555

[nodes.a2]
type = "python"
respond_to_probes = true

[nodes.b1]
type = "rust"
respond_to_probes = true
listen_port = 5555

[nodes.b2]
type = "python"
respond_to_probes = true

[links]
a1-hub_a = "tcp"
a2-hub_a = "tcp"
b1-hub_b = "tcp"
b2-hub_b = "tcp"

# Phase 0: Let management announces settle
[[steps]]
action = "sleep"
duration_secs = 60

# Phase 1: Verify initial cross-cluster path convergence
[[steps]]
action = "wait_for_path"
on = "a1"
destination = "b1.probe"
timeout_secs = 120

[[steps]]
action = "wait_for_path"
on = "b1"
destination = "a1.probe"
timeout_secs = 120

# Phase 2: Wait 5 minutes for rate limiter accumulation
[[steps]]
action = "sleep"
duration_secs = 300

# Phase 3: Selftest — new announces must propagate through LoRa
[[steps]]
action = "exec"
on = "a1"
command = "lns selftest 127.0.0.1:5555 b1:5555 --mode link --rate 1 --duration 3 --discovery-timeout 240"
expect_exit_code = 0
env = { RUST_LOG = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info" }
