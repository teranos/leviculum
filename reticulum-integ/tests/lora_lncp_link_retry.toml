# E34 link request retry test: proxy drops first 2 link-request-sized
# frames, verifying that the link establishes on the 3rd attempt via
# the retry mechanism. Then a file transfer confirms the link works.
#
# Link requests are ~86 bytes. The proxy targets frames 50-130 bytes
# going a_to_b, which matches link requests but not announces (~167)
# or data segments (~490).
#
# Without E34 retry, this test would fail (link request dropped → no
# proof → link timeout). With retry, the 3rd attempt succeeds.

[test]
name = "lora_lncp_link_retry"
description = "lncp push over LoRa after 2 dropped link requests recovered by E34 retry"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Drop first 2 link-request-sized frames (50-130 bytes).
# Link requests ~86 bytes, proofs ~118 bytes are in this range.
# Announces ~167 bytes and data ~490 bytes are outside.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=a_to_b filter=cmd:0x00 min_size=50 max_size=130 count=2"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 300

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 2
