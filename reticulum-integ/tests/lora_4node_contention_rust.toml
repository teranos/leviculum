# 4-node shared medium contention: two simultaneous 10KB file transfers
# on the same LoRa frequency, competing for airtime via CSMA/CA.
#
#   alpha → beta   (10KB, thread 1)
#   gamma → delta  (10KB, thread 2)
#
# 10KB: reliable under 4-node contention. 20KB exceeds firmware
# queue depth at 62.5kHz — see Codeberg issue #36.
#
# Requires 4 RNode devices at /dev/ttyACM0..3.

[test]
name = "lora_4node_contention_rust"
description = "Two simultaneous 10KB Rust transfers on shared LoRa medium"
timeout_secs = 600
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.gamma]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.delta]
type = "rust"
respond_to_probes = true
rnode = true

# Announce convergence for 4 nodes on shared medium
[[steps]]
action = "sleep"
duration_secs = 40

# Verify all cross-pair paths exist before starting transfers
[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "gamma"
destination = "delta.probe"
timeout_secs = 90

# Two simultaneous transfers competing for the same LoRa channel.
[[steps]]
action = "parallel_file_transfers"
timeout_secs = 360

[[steps.transfers]]
sender = "alpha"
receiver = "beta"
file_size = 10240
timeout_secs = 300

[[steps.transfers]]
sender = "gamma"
receiver = "delta"
file_size = 10240
timeout_secs = 300
