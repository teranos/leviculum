# Jail enforcement: two steps test that the jail directory restriction works.
# Step 1: fetch inside jail (success) — file at /tmp/fetchable/test_transfer.bin
# Step 2: fetch outside jail (failure) — file at /tmp/outside_jail/test_transfer.bin

[test]
name = "lrncp_fetch_jail"
description = "Fetch jail enforcement (allow inside, deny outside)"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

# Step 1: fetch inside jail — should succeed
[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lrncp"
receiver_tool = "lrncp"
mode = "fetch"
receiver_flags = "-F -n -j /tmp/fetchable"
file_sizes = [102400]
direction = "a_to_b"
repeats = 1
timeout_secs = 300

# Step 2: fetch outside jail — should fail
# The executor creates the file at /tmp/outside_jail/test_transfer.bin on
# charlie, then alpha tries to fetch it. Charlie's jail check denies it
# because the path is outside /tmp/fetchable.
[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lrncp"
receiver_tool = "lrncp"
mode = "fetch"
receiver_flags = "-F -n -j /tmp/fetchable"
fetch_path = "/tmp/outside_jail/test_transfer.bin"
expect_result = "failure"
file_sizes = [1024]
direction = "a_to_b"
repeats = 1
timeout_secs = 300
