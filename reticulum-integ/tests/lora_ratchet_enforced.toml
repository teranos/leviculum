# Ratchet enforced test: both destinations enforce ratchets.
# Packets without a valid ratchet key are rejected.
# This is the core of Codeberg issue #19 — ratchet enforcement
# has never been tested over LoRa. If enforcement is broken,
# this test will fail with 0% delivery.

[test]
name = "lora_ratchet_enforced"
description = "Ratchet enforcement over direct LoRa (issue #19)"
timeout_secs = 300
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
listen_port = 4242

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"
listen_port = 4242

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "exec"
on = "alpha"
command = "lns selftest 127.0.0.1:4242 beta:4242 --mode ratchet-enforced --discovery-timeout 120"
expect_exit_code = 0
