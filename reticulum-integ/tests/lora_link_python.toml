# Link establishment + channel messaging over LoRa, Pythonâ†”Python.
# Python-RNS baseline counterpart to `lora_link_rust.toml`, measures
# whether the ~15 % flake rate on our Rust version is also present
# when the exact same hardware and radio profile is driven by the
# Python-RNS reference implementation. See Bug #25 ledger
# `~/.claude/bugs/25.md` CURRENT ("Python baseline measurement").
#
# All radio and timing parameters are byte-for-byte identical to
# `lora_link_rust.toml`. The only differences are the node type
# (`python` on both sides) and the driver tool â€” we use
# `scripts/python_link_selftest.py --responder` / `--initiator`
# instead of `lns selftest --mode link`. The script reproduces the
# Rust selftest's traffic shape: register a destination, announce,
# discover-path, establish a Link, exchange channel messages for
# the configured duration.

[test]
name = "lora_link_python"
description = "Pythonâ†”Python link and channel messages over LoRa via python_link_selftest.py"
timeout_secs = 360

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "python"
respond_to_probes = true
rnode = true

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 90

# Responder on beta runs detached via `nohup ... &`; the exec step
# returns as soon as the shell backgrounds it. The script logs to
# /tmp/mvr-resp.log so the integ harness / human debugger can
# inspect it after the test if needed.
[[steps]]
action = "exec"
on = "beta"
command = "bash /opt/integ-scripts/python_link_responder_bg.sh"
expect_exit_code = 0

# Brief breather so the responder can announce before the initiator
# starts listening. The Rust selftest does the same via its Phase-1
# warm-up.
[[steps]]
action = "sleep"
duration_secs = 5

# Sanity: verify the responder is actually running. Prints the PS
# line to the test log and exits 0 iff at least one python process
# matching the responder argv is found. `grep -v grep` drops the
# grep process itself from the match.
[[steps]]
action = "exec"
on = "beta"
command = "bash /opt/integ-scripts/python_link_check_running.sh"
expect_exit_code = 0

[[steps]]
action = "exec"
on = "alpha"
command = "python3 /opt/integ-scripts/python_link_selftest.py --initiator --rate 1 --duration 60 --discovery-timeout 120"
expect_exit_code = 0
