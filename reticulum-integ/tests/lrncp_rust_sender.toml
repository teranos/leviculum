# Rust sender (lrncp) -> Python relay -> Python receiver (rncp)
# Tests lrncp's send path against Python ecosystem.
# Direction a_to_b only: reverse direction (Python rncp sender -> lrncp
# receiver) stalls at ~28% for files >100KB (see E31).

[test]
name = "lrncp_rust_sender"
description = "Rust lrncp sender through Python relay to Python rncp receiver"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "python"
respond_to_probes = false

[nodes.charlie]
type = "python"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lrncp"
receiver_tool = "rncp"
file_sizes = [102400, 1048576]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
