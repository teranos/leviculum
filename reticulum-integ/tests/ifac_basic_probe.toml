[test]
name = "ifac_basic_probe"
description = "IFAC: matching networkname/passphrase on direct Rust-Python link, probe succeeds"
timeout_secs = 60

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[links.alice-bob]
type = "tcp"
networkname = "testnet"
passphrase = "secret123"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 30

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 1
expect_result = "success"
