# Resource proof retry test: proxy drops first 2 resource-proof-sized frames
# going b_to_a, verifying that the sender's CacheRequest mechanism recovers
# the lost proof and completes the transfer.
#
# Resource proofs are ~83 bytes (1 flags + 1 hops + 16 link_id + 1 context +
# 64 proof_data). The proxy targets frames 75-95 bytes going b_to_a, which
# matches resource proofs but not announces (~167), link requests (~86),
# link proofs (~118), or data segments (~490).
#
# Without CacheRequest, this test would fail: beta sends resource proof
# (dropped by proxy), alpha retries passively 16 times, transfer times out.
# With CacheRequest, alpha sends a CacheRequest after each proof timeout,
# beta re-sends the cached proof, transfer completes.

[test]
name = "lora_lrncp_resource_proof_retry"
description = "lncp push over LoRa after 2 dropped resource proofs recovered by CacheRequest"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::node=debug,reticulum_core::resource=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Drop first 2 resource-proof-sized frames going b_to_a (75-95 bytes).
# Resource proofs ~83 bytes are in this range.
# Link requests ~86 bytes overlap — but link is already established at this
# point so no new link requests will be sent.
# Link proofs ~118 bytes, announces ~167 bytes, data ~490 bytes are outside.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=b_to_a filter=cmd:0x00 min_size=75 max_size=95 count=2"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 300

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 2
