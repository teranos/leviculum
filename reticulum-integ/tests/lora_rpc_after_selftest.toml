# Regression test: rnprobe must work after selftest on same node.
#
# Minimal 2-node LoRa topology. Verifies that rnprobe works both
# before and after running lrns selftest on the same node. Previously,
# selftest wrote its ephemeral identity to the daemon's storage dir,
# causing Python's rnprobe to derive a wrong RPC auth key.
#
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.

[test]
name = "lora_rpc_after_selftest"
description = "Verify rnprobe works after selftest on same node"
timeout_secs = 600

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
listen_port = 5555

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"
listen_port = 5555

# Phase 0: Let announces settle
[[steps]]
action = "sleep"
duration_secs = 60

# Phase 1: Verify basic connectivity
[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Phase 2: rnprobe BEFORE selftest — should work
[[steps]]
action = "rnprobe"
from = "alpha"
to = "beta.probe"
expect_result = "success"
timeout_secs = 90

# Phase 3: Run selftest (creates ephemeral nodes on alpha).
# Do NOT assert exit code — selftest may fail due to LoRa channel saturation,
# but we only care that it ran.
[[steps]]
action = "exec"
on = "alpha"
command = "lrns selftest 127.0.0.1:5555 beta:5555 --mode link --rate 1 --duration 3 --discovery-timeout 240"

# Phase 4: rnprobe AFTER selftest — must still work
[[steps]]
action = "rnprobe"
from = "alpha"
to = "beta.probe"
expect_result = "success"
timeout_secs = 90
