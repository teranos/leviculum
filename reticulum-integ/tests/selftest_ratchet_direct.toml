[test]
name = "selftest_ratchet_direct"
description = "Ratchet selftest modes through single Rust relay"
timeout_secs = 300

# alice is the relay with TCP server on 4242 (alphabetically first = server).
# bob connects as TCP client. Selftest runs on alice and connects its two
# ephemeral nodes to 127.0.0.1:4242 (alice's own TCP server).
[nodes.alice]
type = "rust"
respond_to_probes = false

[nodes.bob]
type = "rust"
respond_to_probes = false

[links]
alice-bob = "tcp"

[[steps]]
action = "sleep"
duration_secs = 5

[[steps]]
action = "exec"
on = "alice"
command = "lns selftest 127.0.0.1:4242 127.0.0.1:4242 --mode ratchet-basic --duration 30"
expect_exit_code = 0
expect_stdout_contains = "PASS"

[[steps]]
action = "exec"
on = "alice"
command = "lns selftest 127.0.0.1:4242 127.0.0.1:4242 --mode ratchet-enforced --duration 30"
expect_exit_code = 0
expect_stdout_contains = "PASS"

[[steps]]
action = "exec"
on = "alice"
command = "lns selftest 127.0.0.1:4242 127.0.0.1:4242 --mode ratchet-rotation --duration 30"
expect_exit_code = 0
expect_stdout_contains = "PASS"

# Corruption test: each byte has 1/10000 chance of being flipped.
# ~3% of packets get a corrupted byte. Corruption also affects announce
# packets during discovery, so the rate must be low enough for discovery
# to succeed. With enforce_ratchets, corrupted data packets fail HMAC
# across all ratchets and are silently dropped — no crash, no state corruption.
[[steps]]
action = "exec"
on = "alice"
command = "lns selftest 127.0.0.1:4242 127.0.0.1:4242 --mode ratchet-enforced --duration 30 --corrupt-every 10000"
expect_exit_code = 0
expect_stdout_contains = "PASS"
