# Two Rust nodes communicating directly over LoRa radio.
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lrnsd with: cargo build --release --bin lrnsd --features serial

[test]
name = "lora_direct_rust"
description = "Two Rust nodes, direct LoRa link via RNode, probe each other"
timeout_secs = 180

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

# No [links] — LoRa is a broadcast medium, no explicit point-to-point links.

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 90

[[steps]]
action = "rnprobe"
from = "alpha"
to = "beta.probe"
expect_result = "success"
timeout_secs = 90

[[steps]]
action = "rnprobe"
from = "beta"
to = "alpha.probe"
expect_result = "success"
timeout_secs = 90
