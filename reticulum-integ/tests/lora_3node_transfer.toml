# 3-node shared medium baseline: 1KB transfer from alpha to beta with gamma
# present as bystander. Gamma's management announces add channel contention
# vs the 2-node baseline (lora_lncp_push).
#
# All three radios are co-located on the same frequency — every node hears
# every other node directly (1-hop paths). No relay is possible.
#
# Requires 3 RNode devices at /dev/ttyACM0, /dev/ttyACM1, /dev/ttyACM2.

[test]
name = "lora_3node_transfer"
description = "lncp push 1KB over LoRa with 3rd node present (shared medium)"
timeout_secs = 480
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.gamma]
type = "rust"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "gamma.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [1024]
direction = "a_to_b"
repeats = 3
timeout_secs = 180
