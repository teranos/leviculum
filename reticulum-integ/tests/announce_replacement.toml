[test]
name = "announce_replacement"
description = "Triangle topology: all three pairs should have direct 1-hop paths"
timeout_secs = 90

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "rust"
respond_to_probes = true

[nodes.charlie]
type = "python"
respond_to_probes = true

[links]
alice-bob = "tcp"
alice-charlie = "tcp"
bob-charlie = "tcp"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 1
expect_result = "success"

[[steps]]
action = "rnprobe"
from = "alice"
to = "charlie.probe"
expect_hops = 1
expect_result = "success"

[[steps]]
action = "rnprobe"
from = "bob"
to = "charlie.probe"
expect_hops = 1
expect_result = "success"
