# 3-node bidirectional: sequential transfer alphaâ†’gamma then gammaâ†’alpha
# with beta as active 3rd peer. Tests file transfer between the alphaâ†”gamma
# pair (ACM0â†”ACM3), which no existing LoRa test covers.
#
# All three radios are co-located on the same frequency â€” every node
# hears every other node directly (1-hop paths).
#
# Requires 3 RNode devices at /dev/ttyACM0, /dev/ttyACM1, /dev/ttyACM2.

[test]
name = "lora_3node_bidir"
description = "lncp bidirectional 2KB over LoRa between alpha and gamma (3-node mesh)"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true

# enable_transport = false: beta is a passive bystander.
# With transport enabled, beta relays link requests and
# proofs between alpha and gamma, causing duplicate packets
# and proof collisions on the shared 125kHz channel.
# The original test design explicitly disabled transport
# to prevent this failure mode.
[nodes.beta]
type = "rust"
respond_to_probes = true
enable_transport = false
rnode = true

[nodes.gamma]
type = "rust"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 30

# Path convergence (beta has transport disabled, skip its probe)
[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "gamma.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "gamma"
destination = "alpha.probe"
timeout_secs = 90

# Bidirectional transfer alphaâ†”gamma (beta as bystander)
[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "gamma"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "both"
repeats = 1
timeout_secs = 300
