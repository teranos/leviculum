[test]
name = "ifac_rust_relay"
description = "Rust relay with IFAC on both links, Python endpoints probe through it"
timeout_secs = 90

[nodes.alice]
type = "python"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[nodes.relay]
type = "rust"
respond_to_probes = false

[links.alice-relay]
type = "tcp"
networkname = "rustnet"
passphrase = "relay_test"

[links.bob-relay]
type = "tcp"
networkname = "rustnet"
passphrase = "relay_test"

[[steps]]
action = "wait_for_path"
on = "alice"
destination = "bob.probe"
timeout_secs = 45

[[steps]]
action = "rnprobe"
from = "alice"
to = "bob.probe"
expect_hops = 2
expect_result = "success"
