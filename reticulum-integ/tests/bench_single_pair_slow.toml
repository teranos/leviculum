[test]
name = "bench_single_pair_slow"
description = "Single-pair probe throughput baseline (SF10/BW125/CR4/8)"
timeout_secs = 600

[radio]
frequency = 869525000
bandwidth = 125000
sf = 10
cr = 8
txpower = 17

[nodes.sender]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.receiver]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "sender"
destination = "receiver.probe"
timeout_secs = 120

[[steps]]
action = "benchmark"
pairs = [{ from = "sender", to = "receiver.probe" }]
duration_secs = 60
label = "single_pair_slow"
