[test]
name = "selftest_ratchet_mixed"
description = "Ratchet selftest through Python relay"
timeout_secs = 300

[nodes.daemon_a]
type = "rust"
respond_to_probes = false

[nodes.pyrelay]
type = "python"
respond_to_probes = false

[nodes.daemon_b]
type = "rust"
respond_to_probes = false

[links]
daemon_a-pyrelay = "tcp"
daemon_b-pyrelay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 8

[[steps]]
action = "exec"
on = "daemon_a"
command = "lrns selftest 127.0.0.1:4242 daemon_b:4242 --mode ratchet-basic --duration 30"
expect_exit_code = 0
expect_stdout_contains = "PASS"
