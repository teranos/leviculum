# LoRa RX verification with CSMA/CA enabled: RNode ↔ T114 LNode
# Same as lora_lnode_probe but with csma_enabled = true on the T114.

[test]
name = "lora_lnode_probe_ca"
description = "RNode and T114 LNode exchange announces and probes over LoRa with CSMA/CA on"
timeout_secs = 180
rust_log = "reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17
csma_enabled = true

[nodes.rnode]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.lnode]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "rnode"
destination = "lnode.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "lnode"
destination = "rnode.probe"
timeout_secs = 90

[[steps]]
action = "rnprobe"
from = "rnode"
to = "lnode.probe"
expect_result = "success"
timeout_secs = 90

[[steps]]
action = "rnprobe"
from = "lnode"
to = "rnode.probe"
expect_result = "success"
timeout_secs = 90
