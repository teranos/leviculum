[test]
name = "lora_lncp_auth_to_python"
description = "lncp push with identity auth over LoRa (Rust sender, Python receiver)"
timeout_secs = 360

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "rncp"
auth_from = "alpha"
file_sizes = [1024]
direction = "a_to_b"
repeats = 1
timeout_secs = 120
