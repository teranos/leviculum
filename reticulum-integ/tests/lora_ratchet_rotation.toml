# Ratchet rotation test: ratchet interval = 5s, keys rotate mid-test.
# Pre-rotation exchange, 6s sleep for interval expiry, re-announce
# to trigger rotation, post-rotation exchange. Verifies peers learn
# new ratchet keys via announce over LoRa and can still decrypt.
#
# Extra timeout: 6s rotation sleep + re-announce propagation over
# LoRa needs more margin than TCP-only rotation tests.

[test]
name = "lora_ratchet_rotation"
description = "Ratchet key rotation over direct LoRa"
timeout_secs = 420
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
listen_port = 4242

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"
listen_port = 4242

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "exec"
on = "alpha"
command = "lns selftest 127.0.0.1:4242 beta:4242 --mode ratchet-rotation --discovery-timeout 120"
expect_exit_code = 0
