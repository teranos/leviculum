# Reproduce late-announce forwarding failure over LoRa.
#
# Same topology as lora_link_interop (2 nodes, direct LoRa), but with
# a 5-minute idle period between initial path convergence and selftest.
# This lets Python's announce rate tracking and duty cycle accounting
# accumulate. The selftest then injects ephemeral client announces
# that must propagate through the LoRa link — if Python suppresses
# late-arriving announces, the selftest's Phase 2 discovery will fail.
#
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lrnsd with: cargo build --release --bin lrnsd --features serial
# Build lrns with: cargo build --release --bin lrns

[test]
name = "lora_late_announce_2node"
description = "Late announce forwarding over LoRa after 5-minute idle"
timeout_secs = 600

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
listen_port = 5555

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"
listen_port = 5555

# Phase 0: Let management announces settle
[[steps]]
action = "sleep"
duration_secs = 60

# Phase 1: Verify initial path convergence
[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 90

# Phase 2: Wait 5 minutes. Python's announce rate limiter and duty
# cycle tracking accumulate during this time.
[[steps]]
action = "sleep"
duration_secs = 300

# Phase 3: Run selftest. The selftest creates ephemeral clients whose
# announces must propagate through the LoRa link.
[[steps]]
action = "exec"
on = "alpha"
command = "lrns selftest 127.0.0.1:5555 beta:5555 --mode link --rate 1 --duration 3 --discovery-timeout 240"
expect_exit_code = 0
