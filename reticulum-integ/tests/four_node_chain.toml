[test]
name = "four_node_chain"
description = "4-node chain: 3-hop probe through mixed Rust and Python relays"
timeout_secs = 120

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay1]
type = "python"
respond_to_probes = false

[nodes.relay2]
type = "rust"
respond_to_probes = false

[nodes.omega]
type = "python"
respond_to_probes = true

[links]
alpha-relay1 = "tcp"
relay1-relay2 = "tcp"
relay2-omega = "tcp"

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "omega.probe"
timeout_secs = 45

[[steps]]
action = "rnprobe"
from = "alpha"
to = "omega.probe"
expect_hops = 3
expect_result = "success"

[[steps]]
action = "wait_for_path"
on = "omega"
destination = "alpha.probe"
timeout_secs = 45

[[steps]]
action = "rnprobe"
from = "omega"
to = "alpha.probe"
expect_hops = 3
expect_result = "success"
