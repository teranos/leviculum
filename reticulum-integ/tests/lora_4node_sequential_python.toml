# Sequential variant of lora_4node_contention_python.
# If Python fails here too, the issue is not RF contention.
# If Python passes here but fails in the parallel variant,
# E34 absence is confirmed as the root cause.
#
# Same topology: 4 Python nodes on same frequency, 2KB each.
# But transfers run sequentially — no RF contention between them.

[test]
name = "lora_4node_sequential_python"
description = "Two sequential 2KB Python rncp transfers on shared LoRa medium"
timeout_secs = 600
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.gamma]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM2"

[nodes.delta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM3"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "gamma"
destination = "delta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "rncp"
receiver_tool = "rncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 120

[[steps]]
action = "file_transfer"
sender = "gamma"
receiver = "delta"
sender_tool = "rncp"
receiver_tool = "rncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 120
