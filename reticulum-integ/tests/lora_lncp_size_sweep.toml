# Baseline file size sweep over direct LoRa (no proxy).
# Tests transfer correctness and timing across a range of sizes.

[test]
name = "lora_lncp_size_sweep"
description = "lncp push multiple file sizes over direct LoRa"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [64, 512, 2048, 5120, 10240, 51200]
direction = "a_to_b"
repeats = 1
timeout_secs = 480
