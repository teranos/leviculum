# LoRa transfer with max_size-bounded proxy filter.
# Drops 2 data frames matching the 400-600 byte range (data segments ≈490 bytes).
# Announces (≈167), link requests (≈86), and proofs (≈118) are outside this range.
# Validates that the max_size proxy filter works correctly over real LoRa.
#
# Note: link establishment under loss is tested separately in lora_lrncp_link_retry
# (dropped link requests) and lora_lrncp_proof_retry (dropped proofs).

[test]
name = "lora_lrncp_link_loss"
description = "lrncp push over LoRa with max_size-bounded proxy dropping 2 data frames"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

# Drop 2 frames between 400-600 bytes (resource data segments ≈490 bytes).
# This is equivalent to the existing proxy test but uses max_size to bound
# the filter range, proving max_size works end-to-end over real LoRa.
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=a_to_b filter=cmd:0x00 min_size=400 max_size=600 count=2"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lrncp"
receiver_tool = "lrncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 300

[[steps]]
action = "proxy_stats"
node = "alpha"
expect_dropped = 2
