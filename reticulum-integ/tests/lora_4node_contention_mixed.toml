# 4-node shared medium contention: Rust and Python transfers competing
# on the same LoRa frequency via CSMA/CA.
#
#   alpha(Rust) → beta(Rust)       (2KB lncp, thread 1)
#   gamma(Python) → delta(Python)  (2KB rncp, thread 2)
#
# All 4 nodes share 869.525 MHz / 62.5 kHz / SF7.
# Requires 4 RNode devices at /dev/ttyACM0..3.

[test]
name = "lora_4node_contention_mixed"
description = "Simultaneous Rust lncp + Python rncp transfers on shared LoRa medium"
timeout_secs = 600
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.gamma]
type = "python"
respond_to_probes = true
rnode = true

[nodes.delta]
type = "python"
respond_to_probes = true
rnode = true

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "gamma"
destination = "delta.probe"
timeout_secs = 90

# Python rnsd has no E34 link request retry. Under 4-node RF contention,
# link proof loss causes the Python rncp transfer to give up while the
# Rust lncp transfer succeeds via E34 retry. Expected to fail.
[[steps]]
action = "parallel_file_transfers"
timeout_secs = 300
expect_result = "failure"

[[steps.transfers]]
sender = "alpha"
receiver = "beta"
file_size = 2048
timeout_secs = 240

[[steps.transfers]]
sender = "gamma"
receiver = "delta"
sender_tool = "rncp"
receiver_tool = "rncp"
file_size = 2048
timeout_secs = 240
