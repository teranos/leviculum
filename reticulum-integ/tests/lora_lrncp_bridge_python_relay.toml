[test]
name = "lora_lrncp_bridge_python_relay"
description = "lrncp push over LoRa-to-TCP bridge with Python relay"
timeout_secs = 480

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
beta-charlie = "tcp"

[[steps]]
action = "sleep"
duration_secs = 40

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 120

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lrncp"
receiver_tool = "lrncp"
file_sizes = [1024]
direction = "a_to_b"
repeats = 1
timeout_secs = 180
