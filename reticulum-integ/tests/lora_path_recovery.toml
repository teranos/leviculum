# Path state recovery test: baseline transfer → link proof loss triggers
# Unresponsive path state → recovery via automatic re-discovery.
#
# Path state Unresponsive: when a link's proof (LRPROOF) never arrives,
# the unvalidated link expires after E34 exhausts its retry budget.
# clean_link_table() then calls mark_path_unresponsive() — both nodes
# have enable_transport = true (the default). The path stays in the
# table but is marked unresponsive. A same-emission announce with
# worse hops is accepted as an alternative route.
#
# E34 budget at 1 hop with UNKNOWN_BITRATE_ASSUMPTION_BPS=300:
# establishment_timeout_ms = 13333 + 6000*(1+1) = 25333ms per attempt.
# 3 attempts (initial + max(2,1) retries) = ~76s. With processing
# overhead, ~94s total. Transfer timeout_secs=150 gives comfortable margin.
#
# Proxy targets link proofs (~118 bytes) with tight size window 115-125.
# This avoids resource REQ packets (~115 bytes) — but since the link
# never establishes, no REQ packets are sent anyway. count=999 ensures
# ALL link proofs are dropped during Phase 2 (not just the first few).

[test]
name = "lora_path_recovery"
description = "Path state recovery after link proof loss over LoRa"
timeout_secs = 600
rust_log = "reticulum_core::transport=debug,reticulum_core::link=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true
rnode_proxy = true

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true

# Phase 1 — Baseline: prove the path works
[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 60

# Phase 2 — Trigger Unresponsive: drop ALL link proofs b_to_a
[[steps]]
action = "proxy_rule"
node = "alpha"
rule = "drop direction=b_to_a filter=cmd:0x00 min_size=115 max_size=125 count=999"

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 150
expect_result = "failure"

# Phase 3 — Recovery: clear proxy, verify re-discovery, transfer again
[[steps]]
action = "proxy_rule_clear"
node = "alpha"
id = "all"

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 1
timeout_secs = 120
