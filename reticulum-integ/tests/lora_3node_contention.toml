# 3-node network recovery: transfer from alpha to beta after gamma
# restarts. Tests that the network re-converges after a node restart
# and file transfer works on the recovered topology.
#
# Previous design restarted gamma mid-transfer, causing non-deterministic
# RF collisions from gamma's post-restart announces. This redesign
# restarts gamma before the transfer and waits for path re-convergence,
# making the test deterministic.
#
# Requires 3 RNode devices at /dev/ttyACM0, /dev/ttyACM1, /dev/ttyACM3.

[test]
name = "lora_3node_contention"
description = "lrncp push 2KB over LoRa after 3rd node restart and re-convergence"
timeout_secs = 600
rust_log = "reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 125000
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM1"

[nodes.gamma]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM3"

[[steps]]
action = "sleep"
duration_secs = 30

# Phase 1: Initial 3-node path convergence
[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "gamma.probe"
timeout_secs = 90

# Phase 2: Restart gamma and wait for re-convergence
[[steps]]
action = "restart"
node = "gamma"

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "gamma.probe"
timeout_secs = 90

# Phase 3: Transfer on the recovered network
[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "beta"
sender_tool = "lrncp"
receiver_tool = "lrncp"
file_sizes = [2048]
direction = "a_to_b"
repeats = 3
timeout_secs = 300
