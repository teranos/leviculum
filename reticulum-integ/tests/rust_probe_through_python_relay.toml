[test]
name = "rust_probe_through_python_relay"
description = "Rust transport node probes through Python relay to remote Rust target (2 hops)"
timeout_secs = 90

[nodes.daemon]
type = "rust"
enable_transport = true
respond_to_probes = true

[nodes.relay]
type = "python"
enable_transport = true
respond_to_probes = false

[nodes.client_target]
type = "rust"
enable_transport = true
respond_to_probes = true

[links]
daemon-relay = "tcp"
client_target-relay = "tcp"

[[steps]]
action = "wait_for_path"
on = "daemon"
destination = "client_target.probe"
timeout_secs = 30

[[steps]]
action = "rnprobe"
from = "daemon"
to = "client_target.probe"
expect_hops = 2
expect_result = "success"
