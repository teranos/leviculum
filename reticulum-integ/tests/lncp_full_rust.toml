# Full Rust: lncp through lnsd relay
# Tests pure Rust file transfer end-to-end.

[test]
name = "lncp_full_rust"
description = "Full Rust: lncp through lnsd relay"
timeout_secs = 600

[nodes.alpha]
type = "rust"
respond_to_probes = true

[nodes.relay]
type = "rust"
respond_to_probes = false

[nodes.charlie]
type = "rust"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 10

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "file_transfer"
sender = "alpha"
receiver = "charlie"
sender_tool = "lncp"
receiver_tool = "lncp"
file_sizes = [102400, 1048576]
direction = "both"
repeats = 3
timeout_secs = 300
