# Rust and Python nodes communicating directly over LoRa radio.
# Tests KISS framing compatibility, announce format, packet encoding.
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lnsd with: cargo build --release --bin lnsd --features serial

[test]
name = "lora_interop_rust_python"
description = "Rust and Python nodes, direct LoRa link, bidirectional probes"
timeout_secs = 180
rust_log = "reticulum_core::link::channel=debug,reticulum_core::link=debug,reticulum_core::transport=debug,reticulum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = "/dev/ttyACM0"

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = "/dev/ttyACM1"

# No [links] — LoRa is a broadcast medium, no explicit point-to-point links.

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 90

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 90

[[steps]]
action = "rnprobe"
from = "alpha"
to = "beta.probe"
expect_result = "success"
timeout_secs = 90

[[steps]]
action = "rnprobe"
from = "beta"
to = "alpha.probe"
expect_result = "success"
timeout_secs = 90
