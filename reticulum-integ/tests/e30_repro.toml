# E30 reproduction: all-Python announce propagation through relay
[test]
name = "e30_repro"
timeout_secs = 120

[nodes.alpha]
type = "python"
respond_to_probes = true

[nodes.relay]
type = "python"

[nodes.charlie]
type = "python"
respond_to_probes = true

[links]
alpha-relay = "tcp"
charlie-relay = "tcp"

[[steps]]
action = "sleep"
duration_secs = 20

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "charlie.probe"
timeout_secs = 60

[[steps]]
action = "rnprobe"
from = "alpha"
to = "charlie.probe"
timeout_secs = 30
