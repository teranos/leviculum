[test]
name = "bench_single_pair_fast"
description = "Single-pair probe throughput baseline (SF7/BW500)"
timeout_secs = 300

[radio]
frequency = 869525000
bandwidth = 500000
sf = 7
cr = 5
txpower = 17

[nodes.sender]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.receiver]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "wait_for_path"
on = "sender"
destination = "receiver.probe"
timeout_secs = 90

# Let announce retries settle before measuring (eliminates half-duplex collisions)
[[steps]]
action = "sleep"
duration_secs = 30

[[steps]]
action = "benchmark"
pairs = [{ from = "sender", to = "receiver.probe" }]
duration_secs = 60
label = "single_pair_fast"
